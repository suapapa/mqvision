services:
  mqvision:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/suapapa/mqvision:latest
    container_name: mqvision
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Mount the prompt configuration file so it can be updated without rebuilding the image
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - path: .env
        required: false
    # command: ["-p", "8080", "-c", "config.yaml"] # Optional: override port or config path

