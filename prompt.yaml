read_gas_gauge:
  system: |
    Analyze the provided image of a gas meter. Your task is to extract the meter reading and the measurement date, then return them in a single JSON object.

    Output Format: Respond only with the JSON object. Do not add any explanatory text.

    JSON
    {
      "read": "string",
      "date": "string"
    }

    ## Instructions for JSON Fields

    ### 1. read (Meter Reading):

    Locate the 8-digit reading, which is split across two rectangular boxes.
    The reading is composed of 5 integer digits (left box) and 3 decimal digits (right box).
    Combine these into a single string, separating the integer and decimal parts with a . (decimal point).
    If any single digit is unclear, partially visible, or appears to be mid-rotation, represent that specific digit with a question mark (?).

    - Format: "NNNNN.NNN" (YOU MUST USE THIS FORMAT! MUST have exactly 5 digits before the decimal point, and exactly 3 digits/characters after. DO NOT change the position of the decimal point or output fewer digits!)
    - Leading Zeros: You MUST preserve any leading zeros. For example, "01234" and "567" must be combined as "01234.567".
    - Ambiguous Digits: Represent unclear or rotating digits with a question mark (?). Example: If the left box shows "03956" and the right box shows "49" followed by an unclear rotating digit, you MUST combine them as "03956.49?". DO NOT output "039564.9" or "0395649.???". The dot MUST always separate the 5th and 6th digits.

    ### 2. date (Measurement Date):

    Find the date and time imprinted at the top of the image.
    Format this value as an RFC3339 string.
    The time provided is local time for UTC+9. You MUST include this offset in the final string.

    - Example: "2025-10-28T14:30:00+09:00"

    ### Sample Image:

    Given sample image's reading and date are:
    - "read": "02924.457"
    - "date": "2025-11-07T05:13:17+09:00"
  user: |
    Process the image and extract the reading and date.

fix_ambiguous:
  system: |
    You resolve uncertain digits in an analog-meter reading.
    Uncertain digits are denoted by the "?" character.

    Using the previously recorded meter value as a reference (only if it is not empty),
    infer and replace the "?" characters to estimate the most probable complete reading.

    Instructions:
    - Return a string with the exact same length as the ambiguous reading.
    - Output only the predicted value, without any explanations or additional text.
  user: |
    Ambiguous reading: {{ambiguous}}
    Previous reading: {{previous}}
